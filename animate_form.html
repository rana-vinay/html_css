<!DOCTYPE html>
<html>
<head>
<title>Animated Form</title>

<style>
body{
    background:linear-gradient(to right,#74ebd5,#ACB6E5);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}

form{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
    animation:fadeIn 1s ease;
}

input,textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:2px solid #ccc;
    border-radius:10px;
    transition:0.3s;
}

input:focus,textarea:focus{
    border-color:rgb(0, 51, 236);
    box-shadow:0 0 10px rgb(66, 3, 255);
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056b3;
    transform:scale(1.05);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(-30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

<script>
function showMessage(){
    alert("✅ Form Submitted Successfully!");
    return false;
}
</script>

</head>

<body>

<form onsubmit="return showMessage();">

<b>Name:</b>
<input type="text" placeholder="Enter Your Name">

<b>Username:</b>
<input type="text" placeholder="Enter Your Username">

<b>Password:</b>
<input type="password" placeholder="Enter Your Password">

<b>Address:</b>
<textarea rows="4" placeholder="Enter Your Address"></textarea>

<button type="submit"><b>Submit</b></button>

</form>

</body>
</html>
